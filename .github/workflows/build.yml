name: Build dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build dylib
        run: |
          # 找到 iOS SDK 路径
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "使用 SDK: $SDK_PATH"
          
          # 编译 dylib
          clang -arch arm64 \
            -dynamiclib \
            -isysroot $SDK_PATH \
            -mios-version-min=14.0 \
            -framework Foundation \
            -framework UIKit \
            -framework Security \
            -framework SystemConfiguration \
            -o UniversalCrack.dylib \
            UniversalCrack.m
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniversalCrack.dylib
          path: UniversalCrack.dylib
